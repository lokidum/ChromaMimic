    <!-- Structured data: how-to -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "HowTo",
        "name": "How to create a LUT from a reference image",
        "description": "Build a .cube 3D LUT that matches any film look from two frames, free and in your browser.",
        "totalTime": "PT3M",
        "tool": [{ "@type": "HowToTool", "name": "ChromaMimic" }],
        "step": [
          {
            "@type": "HowToStep",
            "position": 1,
            "name": "Load your original frame",
            "text": "Drop your ungraded source still (a JPG or PNG export of your footage) into ChromaMimic."
          },
          {
            "@type": "HowToStep",
            "position": 2,
            "name": "Load your reference frame",
            "text": "Drop the graded look you want to match: a film screenshot or a still you love."
          },
          {
            "@type": "HowToStep",
            "position": 3,
            "name": "Build and refine the LUT",
            "text": "Press Build. ChromaMimic measures both frames and learns the colour transform. Refine it with the grade controls and compare before and after."
          },

            "@type": "HowToStep",

    <!-- Structured data: FAQ -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What is a .cube LUT file?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "A .cube file is a 3D lookup table: a grid that maps every input RGB colour to an output colour. Your editor reads it and applies the same colour transform to every pixel of your footage. ChromaMimic exports the Adobe Cube v1.0 format, which DaVinci Resolve, Premiere Pro, Final Cut and Photoshop all read."
            }
          },
          {
            "@type": "Question",
            "name": "Is ChromaMimic free, and do my images get uploaded?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "ChromaMimic is free to use: grade and preview with no account. A free account gives you 3 downloads per month, and ChromaMimic Pro ($5/month or $39/year) unlocks unlimited downloads, Wheel mode and 65³ LUTs. The colour engine runs entirely in your browser, so your frames never leave your machine."
            }
          },
          {
            "@type": "Question",
            "name": "What do I get with ChromaMimic Pro?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "ChromaMimic Pro is $5/month or $39/year with a 7-day free trial. It unlocks unlimited downloads in every format, Wheel mode for full colorist-style colour grading, 65³ high-precision LUTs, and a saved LUT library. Cancel anytime."
            }
          },
          {
            "@type": "Question",
            "name": "How do I create a LUT from a reference image?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Drop your original (ungraded) frame and a reference still with the look you want. ChromaMimic measures the colour distribution of both and learns a transform that pushes your frame toward the reference, then writes it out as a .cube LUT you can load in any major editor."
            }
          },
          {
            "@type": "Question",
            "name": "Why does my LUT look flat or wrong on S-Log3 footage?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Matching works in display colour (sRGB / Rec.709). If your footage is log (S-Log3, V-Log, LogC), convert it to Rec.709 with a Color Space Transform first, then apply the LUT after that node. Building the match from log frames measures colour in the wrong space and looks flat."
            }
          },
          {
            "@type": "Question",
            "name": "Which LUT size should I export, 17, 33 or 65?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "33 is the standard and the most compatible choice. 17 is smaller and faster. 65 is the highest precision, but some older Premiere Pro builds reject LUTs above 33, so rebuild at 33 if a 65 LUT will not load."
            }
          }
        ]
      }
    </script>
